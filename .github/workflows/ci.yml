# 插件依赖 Caddy 二进制（运行时强依赖）。CI 中安装 Caddy 以便 e2e 能启动插件并注册。
# 当前 e2e 只请求 http://localhost，未测 https://xxx.localhost，故未做证书信任；
# 若日后增加 HTTPS e2e，可设置 NODE_EXTRA_CA_CERTS=~/.local/share/caddy/pki/authorities/local/root.crt 或使用 caddy trust。
name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '22'
          cache: true
      - run: vp install
      - run: vp check

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '22'
          cache: true

      - name: Install Caddy (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y debian-keyring debian-archive-keyring apt-transport-https curl
          curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key' | sudo gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg
          curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt' | sudo tee /etc/apt/sources.list.d/caddy-stable.list
          sudo apt-get update -qq
          sudo apt-get install -y caddy
          sudo setcap 'cap_net_bind_service=+ep' /usr/bin/caddy 2>/dev/null || true

      - name: Install Caddy (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install caddy

      - name: Start Caddy (CI, Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          set -euo pipefail
          CFG="$(mktemp)"
          cat >"$CFG" <<'EOF'
          {
            "admin": {
              "listen": "127.0.0.1:2019"
            },
            "apps": {
              "http": {
                "servers": {
                  "ci": {
                    "listen": [":443"],
                    "routes": [
                      {
                        "handle": [
                          {
                            "handler": "static_response",
                            "body": "caddy-ci",
                            "status_code": 200
                          }
                        ]
                      }
                    ]
                  }
                }
              }
            }
          }
          EOF
          sudo nohup caddy run --config "$CFG" >"$RUNNER_TEMP/caddy.log" 2>&1 &
          for i in $(seq 1 60); do
            if curl -fsS "http://127.0.0.1:2019/config/" >/dev/null 2>&1; then
              echo "Caddy admin ready"
              exit 0
            fi
            sleep 1
          done
          echo "Caddy admin not ready"; tail -200 "$RUNNER_TEMP/caddy.log" || true
          exit 1
        shell: bash

      - run: vp install
      - run: vp run build

      # 仅打印 runner 环境（e2e 走 https://*.localhost:443 + Admin :2019）
      - name: Runner 环境
        run: |
          echo "RUNNER_OS = $RUNNER_OS"
          node -e "require('dns').lookup('e2e.localhost', (e, r) => console.log('.localhost 解析:', e ? e.code : r));" && sleep 1
        shell: bash

      - run: vp test
