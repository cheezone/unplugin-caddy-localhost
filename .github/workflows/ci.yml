# 插件依赖 Caddy 二进制（运行时强依赖）。CI 中安装 Caddy 以便 e2e 能启动插件并注册。
# 当前 e2e 只请求 http://localhost，未测 https://xxx.localhost，故未做证书信任；
# 若日后增加 HTTPS e2e，可设置 NODE_EXTRA_CA_CERTS=~/.local/share/caddy/pki/authorities/local/root.crt 或使用 caddy trust。
name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

  test:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        node: [lts/*]
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
      - name: Set node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Caddy (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y debian-keyring debian-archive-keyring apt-transport-https curl
          curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key' | sudo gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg
          curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt' | sudo tee /etc/apt/sources.list.d/caddy-stable.list
          sudo apt-get update -qq
          sudo apt-get install -y caddy
          sudo setcap 'cap_net_bind_service=+ep' /usr/bin/caddy 2>/dev/null || true

      - name: Install Caddy (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install caddy

      - name: Install Caddy (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install caddy -y

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      # CI 环境诊断：确认 .localhost 解析、443 是否可连、是否缺 Caddy trust
      - name: CI 环境诊断
        run: |
          node -e "
          const dns = require('dns');
          const net = require('net');
          console.log('RUNNER_OS =', process.env.RUNNER_OS);
          console.log('NODE_VERSION =', process.version);
          dns.lookup('e2e.localhost', (err, addr) => {
            if (err) console.log('.localhost 解析: 失败', err.code, err.message);
            else console.log('.localhost 解析: e2e.localhost ->', addr);
            const done = () => process.exit(0);
            const s = net.createConnection(443, '127.0.0.1', () => { console.log('127.0.0.1:443 可连接（test 前应未占用）'); s.destroy(); done(); });
            s.on('error', e => { console.log('127.0.0.1:443', e.code || 'error', e.message); done(); });
          });
          "
        shell: bash

      - name: CI 诊断 Caddy trust (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          CADDY_ROOT="$HOME/.local/share/caddy/pki/authorities/local/root.crt"
          if [ -f "$CADDY_ROOT" ]; then
            echo "Caddy root.crt 存在，设置 NODE_EXTRA_CA_CERTS 供 Test 使用"
            echo "NODE_EXTRA_CA_CERTS=$CADDY_ROOT" >> $GITHUB_ENV
          else
            echo "Caddy root.crt 不存在（e2e 使用 rejectUnauthorized: false，不依赖 trust）"
          fi
        shell: bash

      - name: CI 诊断 Caddy trust (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          $caddyRoot = "$env:APPDATA\Caddy\pki\authorities\local\root.crt"
          if (Test-Path $caddyRoot) {
            Write-Host "Caddy root.crt 存在，设置 NODE_EXTRA_CA_CERTS"
            "NODE_EXTRA_CA_CERTS=$caddyRoot" >> $env:GITHUB_ENV
          } else {
            Write-Host "Caddy root.crt 不存在"
          }
        shell: pwsh

      - name: CI 诊断 Caddy trust (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          CADDY_ROOT="$HOME/Library/Application Support/Caddy/pki/authorities/local/root.crt"
          if [ -f "$CADDY_ROOT" ]; then
            echo "Caddy root.crt 存在"
            echo "NODE_EXTRA_CA_CERTS=$CADDY_ROOT" >> $GITHUB_ENV
          else
            echo "Caddy root.crt 不存在"
          fi
        shell: bash

      - name: Test
        run: bun test
